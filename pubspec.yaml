name: muscle_recovery_fyp
description: AI-Powered Muscle Recovery Recommendation System - FYP by Amjad Issmail & Hasanmahdi Yazbeck

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Health & Sensors
  health: ^10.2.0                    # HealthKit (iOS) - Heart rate, HRV, steps, sleep
  sensors_plus: ^5.0.1               # Accelerometer / Gyroscope
  wearable_communicator: ^0.0.3      # Apple Watch <-> iPhone communication

  # UI & Animations
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  lottie: ^3.1.0                     # Lottie animations for recovery tips
  fl_chart: ^0.68.0                  # Charts for fatigue/recovery graphs
  smooth_page_indicator: ^1.1.0      # Onboarding dots
  shimmer: ^3.0.0                    # Loading placeholders

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Networking & AI
  http: ^1.2.1
  dart_openai: ^4.0.0                # AI recommendation engine

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
